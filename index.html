<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KOASIS Company Limited | Customers Always Come First</title>
    
    <!-- Custom Favicon from GitHub -->
    <link rel="icon" type="image/svg+xml" href="https://raw.githubusercontent.com/MrMAXVW/koasis.net/refs/heads/main/favicon.svg">

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM CDN -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX Compilation -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Google Material Symbols -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; scroll-behavior: smooth; overflow-x: hidden; }
        
        .reveal-on-scroll {
            opacity: 0;
            transform: translateY(30px);
            transition: all 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
        }
        .reveal-on-scroll.active {
            opacity: 1;
            transform: translateY(0);
        }
        
        .hero-gradient {
            background: radial-gradient(circle at 50% 50%, #f0fdf4 0%, #ffffff 100%);
        }

        .interactive-orb {
            position: fixed;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(52, 211, 153, 0.4) 0%, rgba(16, 185, 129, 0) 70%);
            filter: blur(40px);
            border-radius: 50%;
            pointer-events: none;
            z-index: 1;
            transition: transform 0.6s cubic-bezier(0.1, 0.8, 0.2, 1), opacity 0.6s ease;
            will-change: transform;
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            display: inline-block;
            vertical-align: middle;
        }

        .carousel-track {
            display: flex;
            transition: transform 0.7s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .email-hover-effect:hover {
            transform: scale(1.02);
            box-shadow: 0 10px 25px -5px rgba(16, 185, 129, 0.3);
        }
    </style>
</head>
<body class="text-slate-800 bg-white selection:bg-lime-200">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const Icon = ({ name, size = "24px", className = "" }) => (
            <span className={`material-symbols-outlined ${className}`} style={{ fontSize: size }}>
                {name}
            </span>
        );

        const App = () => {
            const [lang, setLang] = useState('en');
            const [scrolled, setScrolled] = useState(false);
            const [orbStyle, setOrbStyle] = useState({ transform: 'translate(50vw, 50vh) scale(1)', opacity: 0.6 });
            const [currentCase, setCurrentCase] = useState(0);
            const logoUrl = "https://raw.githubusercontent.com/MrMAXVW/koasis/main/logo.svg";
            
            const mousePos = useRef({ x: 0, y: 0 });
            const scrollPos = useRef(0);

            useEffect(() => {
                const observer = new IntersectionObserver((entries) => {
                    entries.forEach(entry => { if (entry.isIntersecting) entry.target.classList.add('active'); });
                }, { threshold: 0.1 });
                document.querySelectorAll('.reveal-on-scroll').forEach(el => observer.observe(el));
                
                const handleScroll = () => {
                    setScrolled(window.scrollY > 20);
                    scrollPos.current = window.scrollY;
                    updateOrb();
                };

                const handleMouseMove = (e) => {
                    mousePos.current = { x: e.clientX, y: e.clientY };
                    updateOrb();
                };

                const updateOrb = () => {
                    const viewWidth = window.innerWidth;
                    const viewHeight = window.innerHeight;
                    const baseY = (viewHeight * 0.4) + (scrollPos.current * 0.2);
                    const baseX = (viewWidth * 0.7);
                    const dx = mousePos.current.x - baseX;
                    const dy = mousePos.current.y - baseY;
                    const distance = Math.sqrt(dx * dx + dy * dy);
                    
                    let scale = 1;
                    let opacity = 0.5;
                    let offsetX = 0;
                    let offsetY = 0;

                    if (distance < 400) {
                        scale = 1 + (1 - distance / 400) * 0.8;
                        opacity = 0.5 + (1 - distance / 400) * 0.4;
                        offsetX = (dx / distance) * -20;
                        offsetY = (dy / distance) * -20;
                    }

                    setOrbStyle({
                        transform: `translate(${baseX + offsetX - 150}px, ${baseY + offsetY - 150}px) scale(${scale})`,
                        opacity: opacity
                    });
                };

                window.addEventListener('scroll', handleScroll);
                window.addEventListener('mousemove', handleMouseMove);
                updateOrb();

                const timer = setInterval(() => {
                    setCurrentCase(prev => (prev + 1) % 3);
                }, 5000);

                return () => {
                    window.removeEventListener('scroll', handleScroll);
                    window.removeEventListener('mousemove', handleMouseMove);
                    clearInterval(timer);
                };
            }, [lang]);

            const content = {
                en: {
                    hero: { title: 'Empowering Your Digital Evolution', subtitle: 'KOASIS provides cutting-edge hardware and AI-driven solutions to transform your business documents into strategic assets.', cta: 'Explore Solutions', contactCta: 'Contact Us' },
                    equipment: {
                        title: 'Advanced Equipment',
                        items: [
                            { name: 'Kodak Scanner', desc: 'Industry-leading precision and speed.', icon: 'scanner' },
                            { name: 'HuaGo AI Box', desc: 'Next-gen scanning powered by artificial intelligence.', icon: 'smart_toy' },
                            { name: 'Overhead Scanner', desc: 'Versatile non-contact document capture.', icon: 'center_focus_strong' },
                            { name: 'Book Scanner', desc: 'Preserving knowledge with high-res imaging.', icon: 'menu_book' },
                            { name: 'Storage', desc: 'Secure and scalable high-performance storage.', icon: 'database' },
                            { name: 'Custom Hardware', desc: 'Consult with our experts for specialized requirements.', icon: 'more_horiz' }
                        ]
                    },
                    solutions: {
                        title: 'Smart Solutions',
                        items: [
                            { name: 'AI Capture', desc: 'Advanced AI-powered data extraction and classification.', icon: 'psychology' },
                            { name: 'Front End Capture', desc: 'Efficient point-of-entry document digitization.', icon: 'input' },
                            { name: 'SharePoint Alt', desc: 'Modern alternatives for collaboration and storage.', icon: 'rebase_edit' },
                            { name: 'Document Management', desc: 'Comprehensive systems for organizing records.', icon: 'description' },
                            { name: 'Security', desc: 'Enterprise-grade encryption and access control.', icon: 'enhanced_encryption' },
                            { name: 'RPA', desc: 'Robotic Process Automation for repetitive tasks.', icon: 'bolt' },
                            { name: 'BI', desc: 'Business Intelligence tools for data insights.', icon: 'monitoring' },
                            { name: 'And More', desc: 'Bespoke software development for your unique needs.', icon: 'add_circle' }
                        ]
                    },
                    cases: {
                        title: 'Success Stories',
                        items: [
                            { company: 'Global Finance Corp', text: 'Digitized over 10 million archival records with 99.9% accuracy using AI Capture.', icon: 'account_balance' },
                            { company: 'Public Health Institute', text: 'Optimized patient record workflow, reducing retrieval time from hours to seconds.', icon: 'medical_services' },
                            { company: 'City Logistics Hub', text: 'Implemented RPA and smart scanners to automate 80% of shipping documentation.', icon: 'local_shipping' }
                        ]
                    },
                    contact: { 
                        title: 'Contact Us', 
                        subtitle: 'Reach out to our experts today for a tailored consultation.',
                        name: 'Full Name', 
                        email: 'Email Address', 
                        message: 'Your Message', 
                        send: 'Send Inquiry', 
                        emailVal: 'ken.ng@koasis.net' 
                    }
                },
                zh: {
                    hero: { title: '賦能您的數位轉型', subtitle: 'KOASIS 提供頂尖硬體與 AI 驅動方案，將您的業務文件轉化為戰略資產。', cta: '立即探索', contactCta: '聯絡我們' },
                    equipment: {
                        title: '先進硬體設備',
                        items: [
                            { name: 'Kodak 掃描器', desc: '業界領先的精準度與速度。', icon: 'scanner' },
                            { name: 'HuaGo AI 影像盒子', desc: '人工智慧驅動的新一代掃描技術。', icon: 'smart_toy' },
                            { name: 'Unis 高拍儀', desc: '多功能非接觸式文件擷取。', icon: 'center_focus_strong' },
                            { name: '圖書掃描器', desc: '細緻的高解析影像，守護知識傳承。', icon: 'menu_book' },
                            { name: '存儲設備', desc: '安全、可擴展的高性能存儲方案。', icon: 'database' },
                            { name: '更多硬體', desc: '與我們的專家諮詢，定製專屬硬體方案。', icon: 'more_horiz' }
                        ]
                    },
                    solutions: {
                        title: '智慧解決方案',
                        items: [
                            { name: 'AI 擷取方案', desc: '先進的 AI 數據提取與文件自動分類技術。', icon: 'psychology' },
                            { name: '前端擷取系統', desc: '高效的入口點文件數位化解決方案。', icon: 'input' },
                            { name: 'SharePoint 替代方案', desc: '現代化的企業協作與存儲替代方案。', icon: 'rebase_edit' },
                            { name: '文件管理系統', desc: '全面的紀錄組織與檢索管理系統。', icon: 'description' },
                            { name: '資訊安全', desc: '企業級數據加密與嚴格的資產訪問控制。', icon: 'enhanced_encryption' },
                            { name: 'RPA 自動化', desc: '機器人流程自動化，消除重複性手動工作。', icon: 'bolt' },
                            { name: 'BI 商業智能', desc: '商業智能工具，將數據轉化為可視化洞察。', icon: 'monitoring' },
                            { name: '更多方案', desc: '為您的獨特需求提供定制化軟件開發服務。', icon: 'add_circle' }
                        ]
                    },
                    cases: {
                        title: '成功案例',
                        items: [
                            { company: '環球金融集團', text: '利用 AI 擷取技術將超過一千萬份存檔文件數位化，準確率達 99.9%。', icon: 'account_balance' },
                            { company: '公共衛生中心', text: '優化病歷工作流程，將檢索時間從數小時縮短至幾秒鐘。', icon: 'medical_services' },
                            { company: '城市物流樞紐', text: '實施 RPA 與智能掃描器，實現 80% 運輸文件的自動化處理。', icon: 'local_shipping' }
                        ]
                    },
                    contact: { 
                        title: '聯絡我們', 
                        subtitle: '即刻聯繫我們的專家，獲取您的專屬顧問方案。',
                        name: '姓名', 
                        email: '電郵', 
                        message: '訊息', 
                        send: '提交查詢', 
                        emailVal: 'ken.ng@koasis.net' 
                    }
                }
            };
            const t = content[lang];

            return (
                <div className="relative overflow-x-hidden w-full">
                    <div className="interactive-orb" style={orbStyle}></div>
                    <nav className={`fixed w-full z-[100] transition-all duration-500 ${scrolled ? 'bg-white/95 backdrop-blur-md shadow-md py-3' : 'bg-transparent py-6'}`}>
                        <div className="container mx-auto px-6 flex justify-between items-center">
                            <a href="#"><img src={logoUrl} alt="KOASIS" className="h-8 md:h-10 w-auto" /></a>
                            <button 
                                onClick={() => setLang(lang === 'en' ? 'zh' : 'en')} 
                                className="p-3 bg-emerald-100 text-emerald-700 rounded-xl hover:bg-emerald-200 transition-all flex items-center justify-center aspect-square"
                                title={lang === 'en' ? '切換至中文' : 'Switch to English'}
                            >
                                <Icon name="language" size="24px" />
                            </button>
                        </div>
                    </nav>

                    <section className="relative min-h-[90vh] flex items-center pt-20 hero-gradient">
                        <div className="container mx-auto px-6 relative z-10 text-left">
                            <div className="max-w-4xl space-y-8">
                                <h1 className="text-5xl md:text-8xl font-black text-emerald-950 leading-[1.1] tracking-tighter">{t.hero.title}</h1>
                                <p className="text-xl md:text-2xl text-slate-500 max-w-2xl leading-relaxed">{t.hero.subtitle}</p>
                                <div className="flex flex-wrap gap-4 pt-4">
                                    <a href="#solutions" className="bg-emerald-600 text-white px-10 py-5 rounded-2xl font-bold flex items-center gap-2 hover:bg-emerald-700 transition-all shadow-lg hover:-translate-y-1">{t.hero.cta} <Icon name="arrow_forward" size="20px" /></a>
                                    <a href="#contact" className="bg-white border-2 border-emerald-600 text-emerald-600 px-10 py-5 rounded-2xl font-bold hover:bg-emerald-50 transition-all hover:-translate-y-1">{t.hero.contactCta}</a>
                                </div>
                            </div>
                        </div>
                    </section>

                    <section id="equipment" className="relative py-24 bg-white border-t border-slate-100 z-10">
                        <div className="container mx-auto px-6">
                            <div className="text-center mb-16 reveal-on-scroll">
                                <h2 className="text-4xl md:text-5xl font-black text-emerald-950 uppercase tracking-tighter">{t.equipment.title}</h2>
                                <div className="w-20 h-2 bg-lime-400 mx-auto mt-4 rounded-full"></div>
                            </div>
                            <div className="grid md:grid-cols-2 lg:grid-cols-3 gap-8">
                                {t.equipment.items.map((item, idx) => (
                                    <div key={idx} className="reveal-on-scroll p-10 rounded-[2.5rem] bg-slate-50 border border-transparent hover:border-emerald-100 hover:bg-white hover:shadow-2xl transition-all">
                                        <div className="w-16 h-16 bg-white rounded-2xl flex items-center justify-center text-emerald-600 mb-8 shadow-sm"><Icon name={item.icon} size="32px" /></div>
                                        <h3 className="text-2xl font-black mb-4 text-emerald-950">{item.name}</h3>
                                        <p className="text-slate-500 text-lg leading-relaxed">{item.desc}</p>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </section>

                    <section id="solutions" className="relative py-24 bg-emerald-950 text-white z-10">
                        <div className="container mx-auto px-6 text-center">
                            <div className="mb-20 reveal-on-scroll">
                                <h2 className="text-4xl md:text-5xl font-black uppercase tracking-tighter">{t.solutions.title}</h2>
                                <div className="w-20 h-2 bg-lime-400 mx-auto mt-4 rounded-full"></div>
                            </div>
                            <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
                                {t.solutions.items.map((item, idx) => (
                                    <div key={idx} className="reveal-on-scroll p-8 rounded-[2rem] bg-emerald-900/50 border border-emerald-800 hover:bg-emerald-800 transition-all">
                                        <div className="p-4 bg-white/10 rounded-2xl text-lime-300 w-fit mx-auto mb-6 flex items-center justify-center"><Icon name={item.icon} size="40px" /></div>
                                        <h4 className="font-black text-xl mb-3">{item.name}</h4>
                                        <p className="text-emerald-200/70 text-sm leading-relaxed">{item.desc}</p>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </section>

                    <section className="relative py-32 bg-emerald-50 z-10">
                        <div className="container mx-auto px-6 text-center">
                            <div className="mb-16 reveal-on-scroll">
                                <h2 className="text-4xl md:text-5xl font-black text-emerald-950 uppercase tracking-tighter">{t.cases.title}</h2>
                                <div className="w-20 h-2 bg-lime-400 mx-auto mt-4 rounded-full"></div>
                            </div>
                            <div className="max-w-4xl mx-auto overflow-hidden reveal-on-scroll">
                                <div className="carousel-track" style={{ transform: `translateX(-${currentCase * 100}%)` }}>
                                    {t.cases.items.map((item, idx) => (
                                        <div key={idx} className="min-w-full px-4">
                                            <div className="bg-white p-12 md:p-16 rounded-[4rem] shadow-sm border border-emerald-100 border-b-8 border-b-lime-400 relative">
                                                <div className="w-20 h-20 bg-emerald-50 rounded-3xl flex items-center justify-center text-emerald-600 mx-auto mb-8"><Icon name={item.icon} size="40px" /></div>
                                                <h3 className="text-emerald-950 font-black text-2xl mb-6 uppercase tracking-widest">{item.company}</h3>
                                                <p className="text-2xl md:text-3xl text-emerald-950 font-medium leading-tight mb-8 italic">"{item.text}"</p>
                                                <div className="flex justify-center gap-1">{[...Array(5)].map((_, i) => <Icon name="star" key={i} size="20px" className="text-lime-400" />)}</div>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                            <div className="flex justify-center gap-3 mt-10">
                                {t.cases.items.map((_, idx) => (
                                    <button key={idx} onClick={() => setCurrentCase(idx)} className={`h-3 rounded-full transition-all duration-300 ${currentCase === idx ? 'w-10 bg-emerald-600' : 'w-3 bg-emerald-200'}`}></button>
                                ))}
                            </div>
                        </div>
                    </section>

                    <section id="contact" className="relative py-32 bg-emerald-950 text-white z-10">
                        <div className="container mx-auto px-6">
                            <div className="max-w-6xl mx-auto grid lg:grid-cols-2 gap-20">
                                <div className="reveal-on-scroll space-y-10">
                                    <h2 className="text-6xl font-black leading-tight tracking-tighter">{t.contact.title}</h2>
                                    <p className="text-emerald-300 text-xl">{t.contact.subtitle}</p>
                                    
                                    {/* Email Interactive Section */}
                                    <a 
                                        href={`mailto:${t.contact.emailVal}`}
                                        className="email-hover-effect flex items-center gap-6 p-8 rounded-3xl bg-emerald-900 border border-emerald-800 w-full transition-all duration-300 group"
                                    >
                                        <div className="w-12 h-12 bg-emerald-800 rounded-xl flex items-center justify-center text-lime-400 shrink-0 group-hover:bg-lime-400 group-hover:text-emerald-900 transition-colors">
                                            <Icon name="mail" size="24px" />
                                        </div>
                                        <div className="flex flex-col">
                                            <span className="text-xs uppercase tracking-widest text-emerald-500 font-black mb-1">Click to Email</span>
                                            <span className="text-xl md:text-2xl font-bold truncate text-white">{t.contact.emailVal}</span>
                                        </div>
                                    </a>
                                </div>
                                <div className="reveal-on-scroll bg-white rounded-[3rem] p-10 md:p-12 shadow-2xl text-slate-800">
                                    <form className="space-y-6" onSubmit={e => e.preventDefault()}>
                                        <div><label className="text-emerald-950 font-black text-xs uppercase tracking-widest mb-2 block">{t.contact.name}</label><input className="w-full px-6 py-4 rounded-xl bg-slate-100 outline-none font-bold" placeholder={t.contact.name} /></div>
                                        <div><label className="text-emerald-950 font-black text-xs uppercase tracking-widest mb-2 block">{t.contact.email}</label><input className="w-full px-6 py-4 rounded-xl bg-slate-100 outline-none font-bold" placeholder={t.contact.email} /></div>
                                        <div><label className="text-emerald-950 font-black text-xs uppercase tracking-widest mb-2 block">{t.contact.message}</label><textarea rows="3" className="w-full px-6 py-4 rounded-xl bg-slate-100 outline-none font-bold resize-none" placeholder={t.contact.message}></textarea></div>
                                        <button className="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-black py-5 rounded-2xl text-lg transition-all shadow-xl active:scale-95">{t.contact.send}</button>
                                    </form>
                                </div>
                            </div>
                        </div>
                    </section>

                    <footer className="bg-emerald-950 py-12 text-center border-t border-emerald-900/50 z-10 relative">
                        <p className="text-emerald-700 font-black tracking-widest text-xs uppercase opacity-60">© 2026 KOASIS Company Limited. All Rights Reserved.</p>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
