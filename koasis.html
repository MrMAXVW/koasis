<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KOASIS Technology | Empowering Digital Evolution</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM CDN -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX Compilation -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; scroll-behavior: smooth; }
        .reveal-on-scroll {
            opacity: 0;
            transform: translateY(30px);
            transition: all 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
        }
        .reveal-on-scroll.active {
            opacity: 1;
            transform: translateY(0);
        }
        .hero-gradient {
            background: radial-gradient(circle at 50% 50%, #f0fdf4 0%, #ffffff 100%);
        }
        @keyframes pulse-once {
            0% { opacity: 0; transform: scale(0.95); }
            100% { opacity: 1; transform: scale(1); }
        }
        .animate-pulse-once {
            animation: pulse-once 0.5s ease-out forwards;
        }
    </style>
</head>
<body class="text-slate-800 bg-white selection:bg-lime-200">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, createElement, Fragment } = React;

        // Custom Icon Component to handle Lucide in CDN environment
        const Icon = ({ name, size = 24, className = "" }) => {
            const icons = {
                Monitor: <path d="M20 16V4a2 2 0 0 0-2-2H6a2 2 0 0 0-2 2v12m16 0a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2m16 0h2m-22 0h2m4 4h10" />,
                Cpu: <path d="M4 4h16v16H4V4zm12 5V7h-2v2h-2V7H9v2H7v2h2v2H7v2h2v2h2v-2h2v2h2v-2h2v-2h-2v-2h2V9h-2z" />,
                Globe: (
                    <Fragment>
                        <circle cx="12" cy="12" r="10"/><path d="M2 12h20M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
                    </Fragment>
                ),
                Mail: (
                    <Fragment>
                        <rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/>
                    </Fragment>
                ),
                Languages: <path d="m5 8 6 6M4 14l6-6 2-3M2 5h12M7 2h1M22 22l-5-10-5 10M14 18h6" />,
                HardDrive: (
                    <Fragment>
                        <rect width="20" height="8" x="2" y="14" rx="2"/><path d="M2 14h20M6 18h.01M10 18h.01" />
                    </Fragment>
                ),
                Search: (
                    <Fragment>
                        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3" />
                    </Fragment>
                ),
                ShieldCheck: (
                    <Fragment>
                        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><path d="m9 12 2 2 4-4" />
                    </Fragment>
                ),
                Zap: <path d="M13 2 3 14h9l-1 8 10-12h-9l1-8z" />,
                BarChart3: (
                    <Fragment>
                        <path d="M3 3v18h18"/><path d="M18 17V9"/><path d="M13 17V5"/><path d="M8 17v-3"/>
                    </Fragment>
                ),
                Headset: (
                    <Fragment>
                        <path d="M3 11h3a2 2 0 0 1 2 2v3a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-5Zm0 0a9 9 0 1 1 18 0v5a2 2 0 0 1-2 2h-1a2 2 0 0 1-2-2v-3a2 2 0 0 1 2-2h3"/><path d="M21 16v2a2 2 0 0 1-2 2h-5"/>
                    </Fragment>
                ),
                Layers: (
                    <Fragment>
                        <path d="m12.83 2.18a2 2 0 0 0-1.66 0L2.1 6.27a2 2 0 0 0 0 3.46l9.07 4.09a2 2 0 0 0 1.66 0l9.07-4.09a2 2 0 0 0 0-3.46Z"/><path d="m2.1 14.73 9.07 4.09a2 2 0 0 0 1.66 0l9.07-4.09"/><path d="m2.1 10.5 9.07 4.09a2 2 0 0 0 1.66 0l9.07-4.09"/>
                    </Fragment>
                ),
                Cloud: (
                    <Fragment>
                        <path d="M17.5 19x0a7 7 0 1 1-6.71-9h1.71a4.5 4.5 0 1 1 4.5 4.5v.5Z" />
                    </Fragment>
                ),
                ArrowRight: (
                    <Fragment>
                        <path d="M5 12h14M12 5l7 7-7 7" />
                    </Fragment>
                ),
                Star: <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2" />
            };

            return (
                <svg 
                    viewBox="0 0 24 24" 
                    width={size} 
                    height={size} 
                    stroke="currentColor" 
                    strokeWidth="2" 
                    fill="none" 
                    strokeLinecap="round" 
                    strokeLinejoin="round" 
                    className={className}
                >
                    {icons[name] || null}
                </svg>
            );
        };

        const App = () => {
            const [lang, setLang] = useState('en');
            const [scrolled, setScrolled] = useState(false);
            const [activeTab, setActiveTab] = useState(0);
            const [mousePos, setMousePos] = useState({ x: 0, y: 0 });

            const logoUrl = "https://raw.githubusercontent.com/MrMAXVW/koasis/main/logo.svg";

            useEffect(() => {
                const observerOptions = { threshold: 0.1, rootMargin: "0px 0px -50px 0px" };
                const observer = new IntersectionObserver((entries) => {
                    entries.forEach(entry => {
                        if (entry.isIntersecting) entry.target.classList.add('active');
                    });
                }, observerOptions);
                const elements = document.querySelectorAll('.reveal-on-scroll');
                elements.forEach(el => observer.observe(el));
                return () => elements.forEach(el => observer.unobserve(el));
            }, [lang]);

            useEffect(() => {
                const timer = setInterval(() => setActiveTab((prev) => (prev + 1) % 3), 4000);
                const handleScroll = () => setScrolled(window.scrollY > 20);
                window.addEventListener('scroll', handleScroll);
                return () => {
                    clearInterval(timer);
                    window.removeEventListener('scroll', handleScroll);
                };
            }, []);

            const handleMouseMove = (e) => {
                const moveX = (e.clientX / window.innerWidth - 0.5) * 10;
                const moveY = (e.clientY / window.innerHeight - 0.5) * 10;
                setMousePos({ x: moveX, y: moveY });
            };

            const content = {
                en: {
                    hero: {
                        title: 'Empowering Your Digital Evolution',
                        subtitle: 'KOASIS provides cutting-edge hardware and AI-driven solutions to transform your business documents into strategic assets.',
                        cta: 'Explore Solutions',
                        contactCta: 'Contact Us',
                        hub: [
                            { title: 'AI OCR Engine', desc: '99.9% accuracy in data extraction', icon: 'Cpu' },
                            { title: 'Smart Workflow', desc: 'Auto-route files to stakeholders', icon: 'Layers' },
                            { title: 'Cloud Archive', desc: 'Instant access from anywhere', icon: 'Cloud' }
                        ]
                    },
                    equipment: {
                        title: 'Advanced Equipment',
                        items: [
                            { name: 'Kodak Scanner', desc: 'Industry-leading precision and speed.' },
                            { name: 'HuaGo AI Box', desc: 'Next-gen scanning powered by artificial intelligence.' },
                            { name: 'Overhead Scanner (Unis)', desc: 'Versatile non-contact document capture.' },
                            { name: 'Book Scanner', desc: 'Preserving knowledge with delicate high-res imaging.' },
                            { name: 'Storage', desc: 'Secure and scalable high-performance storage solutions.' }
                        ]
                    },
                    solutions: {
                        title: 'Smart Solutions',
                        items: [
                            { name: 'AI Capture', icon: 'Cpu' },
                            { name: 'Front End Capture', icon: 'Search' },
                            { name: 'SharePoint Alt', icon: 'Monitor' },
                            { name: 'Document Management', icon: 'HardDrive' },
                            { name: 'Security', icon: 'ShieldCheck' },
                            { name: 'RPA', icon: 'Zap' },
                            { name: 'BI', icon: 'BarChart3' }
                        ]
                    },
                    services: {
                        title: 'Professional Services',
                        items: [
                            { name: 'BPO Services', desc: 'Optimizing your business processes through outsourcing.' },
                            { name: 'System Integration', desc: 'Seamlessly connecting your digital ecosystem.' },
                            { name: 'Professional Services', desc: 'Expert consultancy and bespoke implementation.' },
                            { name: 'Maintenance', desc: '24/7 support to keep your operations running.' }
                        ]
                    },
                    cases: {
                        title: 'Our Success Cases',
                        placeholder: 'Over the years, we have helped 500+ enterprises digitize their workflow, reducing operational costs by up to 40% while ensuring 100% data compliance.'
                    },
                    about: {
                        title: 'About KOASIS',
                        desc: 'KOASIS is a leading technology partner specializing in document lifecycle management. We bridge the gap between physical paper and digital intelligence.'
                    },
                    contact: {
                        title: 'Contact Us', 
                        name: 'Full Name', email: 'Email Address', message: 'Your Message', send: 'Send Inquiry', 
                        namePlaceholder: 'Enter your name', emailPlaceholder: 'email@example.com', messagePlaceholder: 'How can we help you?',
                        emailVal: 'ken.ng@koasis.net'
                    }
                },
                zh: {
                    hero: {
                        title: '賦能您的數位轉型',
                        subtitle: 'KOASIS 提供頂尖硬體與 AI 驅動方案，將您的業務文件轉化為戰略資產。',
                        cta: '立即探索',
                        contactCta: '聯絡我們',
                        hub: [
                            { title: 'AI 文字識別', desc: '數據擷取準確率達 99.9%', icon: 'Cpu' },
                            { title: '智能工作流', desc: '自動分發文件至相關人員', icon: 'Layers' },
                            { title: '雲端歸檔', desc: '隨時隨地，即時訪問', icon: 'Cloud' }
                        ]
                    },
                    equipment: {
                        title: '先進硬體設備',
                        items: [
                            { name: 'Kodak 掃描器', desc: '業界領先的精準度與速度。' },
                            { name: 'HuaGo AI 影像盒子', desc: '人工智慧驅動的新一代掃描技術。' },
                            { name: 'Unis 高拍儀', desc: '多功能非接觸式文件擷取。' },
                            { name: '圖書掃描器', desc: '細緻的高解析影像，守護知識傳承。' },
                            { name: '存儲設備', desc: '安全、可擴展的高性能存儲方案。' }
                        ]
                    },
                    solutions: {
                        title: '智慧解決方案',
                        items: [
                            { name: 'AI 擷取方案', icon: 'Cpu' },
                            { name: '前端擷取系統', icon: 'Search' },
                            { name: 'SharePoint 替代方案', icon: 'Monitor' },
                            { name: '文件管理系統', icon: 'HardDrive' },
                            { name: '資訊安全', icon: 'ShieldCheck' },
                            { name: 'RPA 自動化', icon: 'Zap' },
                            { name: 'BI 商業智能', icon: 'BarChart3' }
                        ]
                    },
                    services: {
                        title: '專業服務',
                        items: [
                            { name: 'BPO 業務外包', desc: '透過外包優化您的業務流程。' },
                            { name: '系統整合與設計', desc: '無縫連接您的數位生態系統。' },
                            { name: '專業諮詢服務', desc: '專家顧問與客製化實施。' },
                            { name: '維修維護服務', desc: '24/7 全天候支援，確保運作不中斷。' }
                        ]
                    },
                    cases: {
                        title: '成功案例',
                        placeholder: '多年來，我們已協助 500 多家企業實現工作流程數位化，將營運成本降低多達 40%，同時確保數據合規。'
                    },
                    about: {
                        title: '關於 KOASIS',
                        desc: 'KOASIS 是領先的技術合作夥伴，專注於文件生命週期管理。我們彌合紙本與數位智能的鴻溝。'
                    },
                    contact: {
                        title: '聯絡我們', 
                        name: '姓名', email: '電郵', message: '訊息', send: '提交查詢', 
                        namePlaceholder: '請輸入姓名', emailPlaceholder: 'email@example.com', messagePlaceholder: '我們能如何協助您？',
                        emailVal: 'ken.ng@koasis.net'
                    }
                }
            };

            const t = content[lang];

            return (
                <div onMouseMove={handleMouseMove} className="overflow-x-hidden">
                    {/* Header */}
                    <nav className={`fixed w-full z-[100] transition-all duration-500 ${scrolled ? 'bg-white/95 backdrop-blur-md shadow-md py-3' : 'bg-transparent py-6'}`}>
                        <div className="container mx-auto px-6 flex justify-between items-center">
                            <a href="#"><img src={logoUrl} alt="KOASIS" className="h-8 md:h-10 transition-transform hover:scale-105" /></a>
                            <button 
                                onClick={() => setLang(lang === 'en' ? 'zh' : 'en')}
                                className="p-3 bg-emerald-100 text-emerald-700 rounded-xl hover:bg-emerald-200 transition-all active:scale-95 flex items-center justify-center"
                                title={lang === 'en' ? 'Switch to Chinese' : '切換至英文'}
                            >
                                <Icon name="Languages" size={20} />
                            </button>
                        </div>
                    </nav>

                    {/* Hero */}
                    <section className="relative min-h-screen flex items-center pt-20 hero-gradient">
                        <div className="container mx-auto px-6 grid lg:grid-cols-2 gap-12 items-center relative z-10">
                            <div className="space-y-8">
                                <h1 className="text-6xl md:text-8xl font-black text-emerald-950 leading-[0.9] tracking-tighter">
                                    {t.hero.title}
                                </h1>
                                <p className="text-xl text-slate-500 max-w-lg leading-relaxed">{t.hero.subtitle}</p>
                                <div className="flex flex-wrap gap-4">
                                    <a href="#solutions" className="bg-emerald-600 text-white px-8 py-4 rounded-2xl font-bold flex items-center gap-2 hover:bg-emerald-700 transition-all shadow-lg">
                                        {t.hero.cta} <Icon name="ArrowRight" size={20} />
                                    </a>
                                    <a href="#contact" className="bg-white border-2 border-emerald-600 text-emerald-600 px-8 py-4 rounded-2xl font-bold hover:bg-emerald-50 transition-all">
                                        {t.hero.contactCta}
                                    </a>
                                </div>
                            </div>
                            <div className="relative">
                                <div 
                                    className="bg-emerald-950 p-12 rounded-[3.5rem] shadow-2xl min-h-[420px] flex flex-col justify-center items-center text-center transition-transform duration-200"
                                    style={{ transform: `perspective(1000px) rotateY(${mousePos.x}deg) rotateX(${-mousePos.y}deg)` }}
                                >
                                    <div key={activeTab} className="animate-pulse-once">
                                        <div className="w-20 h-20 bg-lime-400 rounded-3xl flex items-center justify-center text-emerald-950 mx-auto mb-6">
                                            <Icon name={t.hero.hub[activeTab].icon} size={40} />
                                        </div>
                                        <h3 className="text-4xl font-black text-white mb-2">{t.hero.hub[activeTab].title}</h3>
                                        <p className="text-emerald-300 text-lg opacity-80">{t.hero.hub[activeTab].desc}</p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </section>

                    {/* Equipment Section */}
                    <section id="equipment" className="py-24 bg-white">
                        <div className="container mx-auto px-6">
                            <h2 className="reveal-on-scroll text-center text-4xl md:text-5xl font-black text-emerald-950 uppercase tracking-tighter mb-16">
                                {t.equipment.title}
                                <div className="w-20 h-2 bg-lime-400 mx-auto mt-4 rounded-full"></div>
                            </h2>
                            <div className="grid md:grid-cols-2 lg:grid-cols-3 gap-8">
                                {t.equipment.items.map((item, idx) => (
                                    <div key={idx} className="reveal-on-scroll p-10 rounded-[2.5rem] bg-slate-50 border border-transparent hover:border-emerald-100 hover:bg-white hover:shadow-2xl transition-all">
                                        <div className="w-16 h-16 bg-white rounded-2xl flex items-center justify-center text-emerald-600 mb-8 shadow-sm">
                                            <Icon name={idx === 4 ? "HardDrive" : "Monitor"} size={30} />
                                        </div>
                                        <h3 className="text-2xl font-black mb-4 text-emerald-950">{item.name}</h3>
                                        <p className="text-slate-500 text-lg leading-relaxed">{item.desc}</p>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </section>

                    {/* Solutions Section */}
                    <section id="solutions" className="py-24 bg-emerald-950 text-white">
                        <div className="container mx-auto px-6">
                            <h2 className="reveal-on-scroll text-center text-4xl md:text-5xl font-black uppercase tracking-tighter mb-20">{t.solutions.title}</h2>
                            <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6 text-center">
                                {t.solutions.items.map((item, idx) => (
                                    <div key={idx} className="reveal-on-scroll p-8 rounded-[2rem] bg-emerald-900/50 border border-emerald-800 hover:bg-emerald-800 transition-all">
                                        <div className="p-4 bg-white/10 rounded-2xl text-lime-300 w-fit mx-auto mb-6">
                                            <Icon name={item.icon} size={36} />
                                        </div>
                                        <h4 className="font-black text-xl">{item.name}</h4>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </section>

                    {/* Success Cases */}
                    <section className="py-24 bg-emerald-50">
                        <div className="container mx-auto px-6">
                            <div className="reveal-on-scroll max-w-4xl mx-auto bg-white p-12 md:p-20 rounded-[4rem] shadow-2xl text-center border-l-8 border-lime-400">
                                <div className="flex justify-center gap-1 mb-8">
                                    {[...Array(5)].map((_, i) => <Icon name="Star" key={i} size={24} className="fill-lime-400 text-lime-400" />)}
                                </div>
                                <p className="text-2xl md:text-3xl text-emerald-950 font-bold leading-snug mb-10">{t.cases.placeholder}</p>
                                <div className="flex justify-center gap-8 opacity-40 font-black text-xl uppercase italic">
                                    <span>Kodak</span><span>HuaGo</span><span>Unis</span>
                                </div>
                            </div>
                        </div>
                    </section>

                    {/* Contact Section */}
                    <section id="contact" className="py-32 bg-emerald-950 text-white">
                        <div className="container mx-auto px-6">
                            <div className="max-w-6xl mx-auto grid lg:grid-cols-2 gap-20">
                                <div className="reveal-on-scroll space-y-10">
                                    <h2 className="text-6xl font-black leading-tight tracking-tighter">{t.contact.title}</h2>
                                    <div className="flex items-center gap-6 p-8 rounded-3xl bg-emerald-900 border border-emerald-800">
                                        <div className="w-12 h-12 bg-emerald-800 rounded-xl flex items-center justify-center text-lime-400"><Icon name="Mail" size={24} /></div>
                                        <span className="text-xl font-bold">{t.contact.emailVal}</span>
                                    </div>
                                </div>
                                <div className="reveal-on-scroll bg-white rounded-[3rem] p-10 md:p-12 shadow-2xl text-slate-800">
                                    <form className="space-y-6" onSubmit={e => e.preventDefault()}>
                                        <div>
                                            <label className="text-emerald-950 font-black text-xs uppercase tracking-widest ml-2 mb-2 block">{t.contact.name}</label>
                                            <input className="w-full px-6 py-4 rounded-xl bg-slate-100 outline-none font-bold focus:ring-2 ring-emerald-500" placeholder={t.contact.namePlaceholder} />
                                        </div>
                                        <div>
                                            <label className="text-emerald-950 font-black text-xs uppercase tracking-widest ml-2 mb-2 block">{t.contact.email}</label>
                                            <input className="w-full px-6 py-4 rounded-xl bg-slate-100 outline-none font-bold focus:ring-2 ring-emerald-500" placeholder={t.contact.emailPlaceholder} />
                                        </div>
                                        <div>
                                            <label className="text-emerald-950 font-black text-xs uppercase tracking-widest ml-2 mb-2 block">{t.contact.message}</label>
                                            <textarea rows="3" className="w-full px-6 py-4 rounded-xl bg-slate-100 outline-none font-bold resize-none focus:ring-2 ring-emerald-500" placeholder={t.contact.messagePlaceholder}></textarea>
                                        </div>
                                        <button className="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-black py-5 rounded-2xl text-lg transition-all shadow-xl active:scale-95">
                                            {t.contact.send}
                                        </button>
                                    </form>
                                </div>
                            </div>
                        </div>
                    </section>

                    <footer className="bg-emerald-950 py-12 text-center border-t border-emerald-900/50">
                        <p className="text-emerald-700 font-black tracking-widest text-xs uppercase opacity-60">© 2026 KOASIS Technology. All Rights Reserved.</p>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
